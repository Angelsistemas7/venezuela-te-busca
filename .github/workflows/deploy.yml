name: Deploy a VPS

# Construye en GitHub Actions y despliega al VPS por SSH (PM2 + Node standalone).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita despliegues solapados si llegan dos pushes seguidos.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Ruta de despliegue en el VPS (no es secreta). Cámbiala aquí si usas otra.
    env:
      DEPLOY_PATH: /var/www/elmundotebusca
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Binario de sharp para ARM64 (el VPS es Ampere aarch64; este runner es x64)
        # npm ci deja el binario nativo de sharp compilado para linux-x64 (el propio
        # runner), que no carga en el VPS (aarch64) -- "Could not load the sharp
        # module using the linux-arm64 runtime". Se reinstala apuntando al target
        # real antes del build, para que el standalone empaquete el binario correcto.
        run: npm install --no-save --os=linux --cpu=arm64 --libc=glibc sharp

      - name: Build (Next.js standalone)
        run: npm run build
        env:
          # Las NEXT_PUBLIC_* se "hornean" en este paso: deben estar como
          # secrets del repositorio. Los secretos de servidor NO van aquí.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://elmundotebusca.com

      - name: Empaquetar salida standalone
        # El standalone no incluye estáticos, /public, ni scripts/ sueltos
        # (fetch-social-posts.mjs corre por cron en el VPS, fuera de Next): hay
        # que copiarlos a mano.
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp ecosystem.config.cjs .next/standalone/
          cp -r scripts .next/standalone/scripts

      - name: Dependencias del script de ingesta (separadas del recorte de Next)
        # El "tracing" de Next para standalone solo copia lo que las rutas de
        # la app usan en tiempo de ejecución, y NO incluye @supabase/supabase-js
        # para este script suelto (confirmado: falta en .next/standalone/node_modules).
        # Se instala aparte, en su propia carpeta node_modules junto al script.
        run: npm install --omit=dev --no-audit --no-fund --prefix .next/standalone/scripts

      - name: Preparar SSH
        env:
          # La llave privada se guarda en base64 (una sola línea) para que al
          # copiarla al secret no se pierdan saltos de línea. Aquí se decodifica.
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Subir al VPS (rsync)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          # Red de seguridad: NUNCA sincronizar contra la raíz. Si DEPLOY_PATH
          # viene vacío o "/", abortamos antes de que --delete toque el sistema.
          case "$DEPLOY_PATH" in
            ""|"/"|"/."|"/root"|"/home"|"/usr"|"/etc"|"/var"|"/boot"|"/bin")
              echo "::error::DEPLOY_PATH inseguro ('$DEPLOY_PATH'). Debe ser algo como /var/www/elmundotebusca."
              exit 1
              ;;
          esac
          # --delete deja la carpeta idéntica al build; --exclude=.env conserva
          # los secretos de runtime que viven en el VPS. --exclude=logs/ conserva
          # los logs de los cron (social-fetch.log, warm-news.log): no son parte
          # del build, así que sin este exclude --delete los borraba en CADA
          # deploy — de hecho ni siquiera dejaba existir la carpeta, lo que hacía
          # fallar en silencio el cron que escribe ahí con `>>`.
          rsync -az --delete --exclude='.env' --exclude='logs/' \
            -e "ssh -p ${VPS_PORT:-22} -i ~/.ssh/id_deploy" \
            .next/standalone/ "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/"

      - name: Reiniciar con PM2
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -p "${VPS_PORT:-22}" -i ~/.ssh/id_deploy "$VPS_USER@$VPS_HOST" \
            "cd '$DEPLOY_PATH' && pm2 startOrReload ecosystem.config.cjs --update-env && pm2 save"
