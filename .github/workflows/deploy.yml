name: Deploy a VPS

# Construye en GitHub Actions y despliega al VPS por SSH (PM2 + Node standalone).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita despliegues solapados si llegan dos pushes seguidos.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build (Next.js standalone)
        run: npm run build
        env:
          # Las NEXT_PUBLIC_* se "hornean" en este paso: deben estar como
          # secrets del repositorio. Los secretos de servidor NO van aquí.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://elmundotebusca.com

      - name: Empaquetar salida standalone
        # El standalone no incluye estáticos ni /public: hay que copiarlos.
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp ecosystem.config.cjs .next/standalone/

      - name: Preparar SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Subir al VPS (rsync)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          # --delete deja la carpeta idéntica al build; --exclude=.env conserva
          # los secretos de runtime que viven en el VPS.
          rsync -az --delete --exclude='.env' \
            -e "ssh -p ${VPS_PORT:-22} -i ~/.ssh/id_deploy" \
            .next/standalone/ "$VPS_USER@$VPS_HOST:$VPS_PATH/"

      - name: Reiniciar con PM2
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh -p "${VPS_PORT:-22}" -i ~/.ssh/id_deploy "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_PATH' && pm2 startOrReload ecosystem.config.cjs --update-env && pm2 save"
